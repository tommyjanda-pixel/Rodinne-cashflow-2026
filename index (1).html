<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodinné Finance 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  :root{--bg:#09090f;--surface:#111118;--card:#16161f;--border:#222230;--border2:#2a2a3a;--green:#22d98a;--gdim:rgba(34,217,138,.12);--red:#ff5c5c;--rdim:rgba(255,92,92,.12);--blue:#4f9eff;--bdim:rgba(79,158,255,.12);--gold:#f5b842;--odim:rgba(245,184,66,.12);--purple:#a78bfa;--text:#e8e8f0;--muted:#5a5a7a;--muted2:#8888aa}
  body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(34,217,138,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(34,217,138,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .hdr{position:relative;z-index:10;padding:22px 26px 0;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(34,217,138,.04) 0%,transparent 100%)}
  .hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
  .brand{display:flex;align-items:center;gap:11px}
  .bico{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--green),#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:19px;box-shadow:0 0 18px rgba(34,217,138,.3)}
  .bname{font-family:'DM Serif Display',serif;font-size:19px}
  .bsub{font-size:11px;color:var(--muted2);margin-top:1px}
  .hmeta{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .rbtn{padding:4px 11px;border-radius:6px;border:1px solid var(--border2);background:var(--card);color:var(--muted2);cursor:pointer;font-size:11px;font-family:'DM Mono',monospace;transition:all .15s}
  .rbtn:hover{color:var(--green);border-color:var(--green)}
  .tabs{display:flex;gap:2px;flex-wrap:wrap}
  .tab{padding:9px 16px;font-size:12px;font-weight:600;color:var(--muted2);cursor:pointer;border:none;background:transparent;font-family:'Syne',sans-serif;border-radius:10px 10px 0 0;transition:all .2s;position:relative;bottom:-1px;border:1px solid transparent;border-bottom:none}
  .tab:hover{color:var(--text)}
  .tab.active{color:var(--text);background:var(--card);border-color:var(--border);border-bottom-color:var(--card)}
  .tab.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--green);border-radius:2px 2px 0 0}
  .cnt{position:relative;z-index:1;padding:22px 26px}
  .tp{display:none}.tp.active{display:block}
  .ld{display:flex;align-items:center;justify-content:center;gap:10px;padding:50px;color:var(--muted2);font-family:'DM Mono',monospace;font-size:12px}
  .sp{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{padding:18px;background:var(--rdim);border:1px solid rgba(255,92,92,.3);border-radius:10px;color:var(--red);font-family:'DM Mono',monospace;font-size:11px;line-height:1.6}
  .mr{display:flex;align-items:center;gap:7px;margin-bottom:18px;flex-wrap:wrap}
  .ml{font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace}
  .mb{padding:5px 11px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:var(--card);color:var(--muted2);font-family:'Syne',sans-serif;transition:all .15s}
  .mb.active{background:var(--green);color:#000;border-color:var(--green);box-shadow:0 0 9px rgba(34,217,138,.4)}
  .mb.dis{opacity:.3;cursor:default}
  .kg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:14px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px 18px;position:relative;overflow:hidden}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:13px 13px 0 0}
  .kpi.g::before{background:var(--green)}.kpi.r::before{background:var(--red)}.kpi.b::before{background:var(--blue)}.kpi.o::before{background:var(--gold)}
  .ki{font-size:15px;margin-bottom:7px}.kl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);margin-bottom:4px;font-family:'DM Mono',monospace}
  .kv{font-size:17px;font-weight:800;letter-spacing:-.5px;margin-bottom:3px}.ks{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
  .kpi.g .kv{color:var(--green)}.kpi.r .kv{color:var(--red)}.kpi.b .kv{color:var(--blue)}.kpi.o .kv{color:var(--gold)}
  .cr{display:grid;grid-template-columns:2fr 1fr;gap:9px;margin-bottom:9px}
  .cr2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
  .cc{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:18px 20px}
  .ct{font-size:12px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:5px}
  svg{overflow:visible;display:block;width:100%}
  .dt{width:100%;border-collapse:collapse;font-size:11px}
  .dt th{text-align:left;padding:0 0 7px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:'DM Mono',monospace;border-bottom:1px solid var(--border)}
  .dt th.r,.dt td.r{text-align:right}
  .dt td{padding:8px 0;border-bottom:1px solid var(--border)}
  .dt tfoot td{border-top:1px solid var(--border2);border-bottom:none;padding-top:9px;font-weight:800}
  .bdg{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-family:'DM Mono',monospace;margin-left:3px}
  .bg{background:var(--gdim);color:var(--green)}.br{background:var(--rdim);color:var(--red)}.bb{background:var(--bdim);color:var(--blue)}.bo{background:var(--odim);color:var(--gold)}.bp{background:rgba(167,139,250,.12);color:var(--purple)}
  .vb{border-radius:13px;padding:18px 22px;display:flex;justify-content:space-between;align-items:center;margin-top:9px;border:1px solid;flex-wrap:wrap;gap:10px}
  .vb.neg{background:var(--rdim);border-color:rgba(255,92,92,.25)}.vb.pos{background:var(--gdim);border-color:rgba(34,217,138,.25)}
  .vl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted2);font-family:'DM Mono',monospace;margin-bottom:4px}
  .vv{font-family:'DM Serif Display',serif;font-size:30px;letter-spacing:-1px}
  .vb.neg .vv{color:var(--red)}.vb.pos .vv{color:var(--green)}
  .vn{font-size:11px;color:var(--muted2);font-family:'DM Mono',monospace;max-width:300px;line-height:1.6}
  .df{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
  .dr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
  .dn{font-size:12px}.ds{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace}
  .dv{font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
  .pl{display:flex;flex-direction:column;gap:6px;margin-top:12px}
  .pi{display:flex;align-items:center;gap:7px;font-size:11px}
  .pd{width:8px;height:8px;border-radius:2px;flex-shrink:0}.pn{color:var(--muted2);flex:1}.pp{font-family:'DM Mono',monospace;font-weight:600}
  .fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
  .fc{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
  .fn{font-size:11px;font-weight:700;margin-bottom:9px}
  .fr{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;font-family:'DM Mono',monospace}
  .fr .lb{color:var(--muted2)}
  .fn2{font-size:9px;color:var(--muted);margin-top:7px;padding:5px;background:var(--card);border-radius:4px;font-family:'DM Mono',monospace}
  @media(max-width:900px){.kg{grid-template-columns:repeat(2,1fr)}.cr,.cr2,.df{grid-template-columns:1fr}}
  @media(max-width:600px){.hdr{padding:12px 12px 0}.cnt{padding:12px}.kg{grid-template-columns:1fr 1fr;gap:6px}.kpi{padding:11px 12px}.kv{font-size:14px}.cc{padding:12px 11px}.tab{padding:8px 10px;font-size:11px}.bname{font-size:15px}.hmeta{display:none}.vb{flex-direction:column}.vv{font-size:24px}.fg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-top">
    <div class="brand"><div class="bico">💼</div><div><div class="bname">Rodinné Finance</div><div class="bsub">Tom & Lenka · Matyáš · Elinka · 2026</div></div></div>
    <div class="hmeta"><div class="dot"></div><span id="upd">Načítám...</span><button class="rbtn" onclick="loadData()">↻ Obnovit</button></div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('p',this)">📊 Přehled</button>
    <button class="tab" onclick="showTab('c',this)">💸 Cashflow</button>
    <button class="tab" onclick="showTab('m',this)">🏛 Majetek</button>
    <button class="tab" onclick="showTab('pl',this)">📋 Plán</button>
  </div>
</div>
<div class="cnt">
  <div class="tp active" id="tp"><div class="ld"><div class="sp"></div>Načítám data z Google Sheets...</div></div>
  <div class="tp" id="tc"><div class="ld"><div class="sp"></div>Načítám...</div></div>
  <div class="tp" id="tm"><div class="ld"><div class="sp"></div>Načítám...</div></div>
  <div class="tp" id="tpl"><div class="ld"><div class="sp"></div>Načítám...</div></div>
</div>
<script>
const SID='1Enami9v_fK1i5JgmMqaIv3vqEZ--mIbDhFIj6aCmsCw';
const MN=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const MS=['Led','Úno','Bře','Dub','Kvě','Čer','Čvc','Srp','Zář','Říj','Lis','Pro'];
let S={mi:0,cfi:0,data:null};
function fk(v){if(v===null||v===undefined||isNaN(v))return'—';const a=Math.abs(v);return(v<0?'−':'')+new Intl.NumberFormat('cs-CZ',{maximumFractionDigits:0}).format(a)+' Kč'}
function fm(v){if(!v&&v!==0)return'—';return Math.abs(v)>=1e6?(v/1e6).toFixed(2)+' M Kč':fk(v)}
function pk(s){if(!s)return 0;const n=parseFloat(s.replace(/[^0-9.,-]/g,'').replace(',','.'));return isNaN(n)?0:n}
function showTab(id,btn){document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.getElementById('t'+id).classList.add('active');btn.classList.add('active');}
function fetchGviz(sheetName){
  return new Promise((resolve,reject)=>{
    const cb='_gv'+Date.now();
    const s=document.createElement('script');
    s.src=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&callback=${cb}&sheet=${encodeURIComponent(sheetName)}&t=${Date.now()}`;
    const timer=setTimeout(()=>{cleanup();reject(new Error('Timeout — zkontroluj sdílení sheetu.'))},12000);
    function cleanup(){delete window[cb];try{document.head.removeChild(s)}catch(e){}clearTimeout(timer);}
    window[cb]=function(d){cleanup();try{const cols=d.table.cols.map(c=>c.label||'');const rows=d.table.rows.map(r=>(r.c||[]).map(cell=>cell&&cell.v!==null&&cell.v!==undefined?String(cell.v):''));resolve([cols,...rows]);}catch(e){reject(new Error('Chyba parsování dat.'))}};
    s.onerror=()=>{cleanup();reject(new Error('Nelze načíst data. Zkontroluj sdílení sheetu.'))};
    document.head.appendChild(s);
  });
}
function parseData(rows){
  const plan={prijmy:[],vydaje:[],aktiva:[]};const mesicni={};let sec='plan';
  for(const row of rows){
    const lbl=(row[0]||'').trim();if(!lbl)continue;
    if(lbl==='Název'&&(row[1]||'').includes('Hodnota')){sec='aktiva';continue}
    if(lbl==='Název'&&(row[1]||'').includes('Leden')){sec='mesicni';continue}
    if(sec==='mesicni'){mesicni[lbl]=row.slice(1).map(v=>pk(v));continue}
    if(sec==='aktiva'&&lbl!=='Míra zadlužení'){plan.aktiva.push({n:lbl,h:pk(row[1]),d:pk(row[2]),m:pk(row[3])});continue;}
    if(sec==='plan'){const typ=(row[2]||'').trim(),mesic=pk(row[4]);
      if(!mesic||lbl.startsWith('Total')||lbl==='Zůstatek'||lbl.startsWith('Změna'))continue;
      if(['výdaj','spoření','investice'].includes(typ))plan.vydaje.push({n:lbl,t:typ,v:mesic});
      else if(mesic>0)plan.prijmy.push({n:lbl,t:typ,v:mesic});
    }
  }
  return{plan,mesicni};
}
async function loadData(){
  document.getElementById('upd').textContent='Načítám...';
  try{
    const rows=await fetchGviz('List1');
    S.data=parseData(rows);
    const tom=garr('Příjem Tom',' Příjem Tom');
    let last=0;tom.forEach((v,i)=>{if(v>0)last=i});
    S.mi=last;S.cfi=last;
    const now=new Date();
    document.getElementById('upd').textContent=`Live · ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
    renderAll();
  }catch(e){
    const h=`<div class="err">⚠️ ${e.message}</div>`;
    ['tp','tc','tm','tpl'].forEach(id=>document.getElementById(id).innerHTML=h);
    document.getElementById('upd').textContent='Chyba';
  }
}
function garr(...keys){for(const k of keys){if(S.data?.mesicni[k])return S.data.mesicni[k]}return Array(12).fill(0)}
function renderAll(){rPrehled();rCashflow();rMajetek();rPlan()}
function bar(series,labels,colors,W=500,H=180){
  const pl=46,pr=8,pt=8,pb=26,cW=W-pl-pr,cH=H-pt-pb;
  const all=series.flatMap(s=>s).filter(v=>v>0);const mx=Math.max(...all,1)*1.1;
  const grpW=cW/labels.length,bw=grpW*.27;let g='',yl='',xl='';
  for(let s=0;s<=4;s++){const v=(mx/4)*s,y=cH-(v/mx*cH);
    yl+=`<line x1="0" y1="${y}" x2="${cW}" y2="${y}" stroke="#222230"/>`;
    yl+=`<text x="-4" y="${y+4}" text-anchor="end" fill="#5a5a7a" font-size="9" font-family="DM Mono">${v>=1e6?(v/1e6).toFixed(1)+'M':(v/1000).toFixed(0)+'k'}</text>`;}
  labels.forEach((l,i)=>{const cx=i*grpW+grpW/2,st=cx-(series.length*(bw+2))/2;
    series.forEach((ser,si)=>{const v=ser[i]||0;if(!v)return;const h=(v/mx)*cH;
      g+=`<rect x="${st+si*(bw+2)}" y="${cH-h}" width="${bw}" height="${h}" fill="${colors[si]}" rx="2" opacity=".88"/>`;});
    xl+=`<text x="${cx}" y="${cH+17}" text-anchor="middle" fill="#5a5a7a" font-size="9" font-family="DM Mono">${l}</text>`;});
  return`<svg viewBox="0 0 ${W} ${H}"><g transform="translate(${pl},${pt})">${yl}${g}${xl}<line x1="0" y1="${cH}" x2="${cW}" y2="${cH}" stroke="#222230"/></g></svg>`;
}
function line(vals,color,W=280,H=140,fmt){
  const pl=44,pr=8,pt=8,pb=24,cW=W-pl-pr,cH=H-pt-pb;
  const vf=vals.filter(v=>v!==null&&!isNaN(v));if(!vf.length)return'';
  const mn=Math.min(...vf),mx=Math.max(...vf),rng=mx-mn||1;
  const pts=vals.map((v,i)=>[(i/(vals.length-1))*cW,cH-((v-mn)/rng*cH)]);
  const pth='M'+pts.map(p=>p.join(',')).join('L');
  const area=`M${pts[0][0]},${cH}L${pts.map(p=>p.join(',')).join('L')}L${pts[pts.length-1][0]},${cH}Z`;
  const f=fmt||(v=>Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':(v/1000).toFixed(0)+'k');
  let yl='',dots='',xl='';
  for(let s=0;s<=3;s++){const v=mn+(rng/3)*s,y=cH-((v-mn)/rng*cH);
    yl+=`<line x1="0" y1="${y}" x2="${cW}" y2="${y}" stroke="#222230"/>`;
    yl+=`<text x="-4" y="${y+4}" text-anchor="end" fill="#5a5a7a" font-size="9" font-family="DM Mono">${f(v)}</text>`;}
  pts.forEach((p,i)=>{dots+=`<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="${color}" stroke="#09090f" stroke-width="2"/>`;
    xl+=`<text x="${p[0]}" y="${cH+17}" text-anchor="middle" fill="#5a5a7a" font-size="9" font-family="DM Mono">${MS[i]}</text>`;});
  return`<svg viewBox="0 0 ${W} ${H}"><g transform="translate(${pl},${pt})">${yl}<path d="${area}" fill="${color}" opacity=".06"/><path d="${pth}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round"/>${dots}${xl}<line x1="0" y1="${cH}" x2="${cW}" y2="${cH}" stroke="#222230"/></g></svg>`;
}
function pie(segs){
  const cx=85,cy=72,r=60,ir=33,W=170,H=145;const tot=segs.reduce((s,sg)=>s+sg.v,0);
  let angle=-Math.PI/2,paths='';
  segs.forEach(sg=>{const sl=(sg.v/tot)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle),x2=cx+r*Math.cos(angle+sl),y2=cy+r*Math.sin(angle+sl);
    const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle),ix2=cx+ir*Math.cos(angle+sl),iy2=cy+ir*Math.sin(angle+sl);
    paths+=`<path d="M${ix1},${iy1}L${x1},${y1}A${r},${r} 0 ${sl>Math.PI?1:0},1 ${x2},${y2}L${ix2},${iy2}A${ir},${ir} 0 ${sl>Math.PI?1:0},0 ${ix1},${iy1}Z" fill="${sg.c}" opacity=".85" stroke="#09090f" stroke-width="2"/>`;
    angle+=sl;});
  const tl=tot>=1e6?(tot/1e6).toFixed(1)+'M':fk(tot);
  paths+=`<text x="${cx}" y="${cy-2}" text-anchor="middle" fill="#e8e8f0" font-size="10" font-family="DM Mono">${tl}</text><text x="${cx}" y="${cy+12}" text-anchor="middle" fill="#5a5a7a" font-size="9" font-family="DM Mono">celkem</text>`;
  return`<svg viewBox="0 0 ${W} ${H}">${paths}</svg>`;
}
function leg(items){return items.map(it=>`<div class="pi"><div class="pd" style="background:${it.c}"></div><div class="pn">${it.n}</div><div class="pp" style="color:${it.c}">${it.p}</div></div>`).join('')}
function rPrehled(){
  const tom=garr('Příjem Tom',' Příjem Tom'),lenka=garr('Příjem Lenka',' Příjem Lenka');
  const pr=garr('Souhrn příjmů',' Souhrn příjmů'),vd=garr('Souhrn výdajů',' Souhrn výdajů');
  const vh=garr('VH rodiny',' VH rodiny'),inv=garr('Hodnota investic',' Hodnota investic'),ost=garr('Ostatní výdaje',' Ostatní výdaje');
  const fi=tom.map((v,i)=>v>0?i:-1).filter(i=>i>=0);
  const idx=Math.min(S.mi,fi.length-1),mi=fi[idx]??idx;
  const P=pr[mi]||(tom[mi]+(lenka[mi]||0)),V=vd[mi]||0,VH=vh[mi]||(P-V),INV=inv[mi]||0;
  const mbs=MN.map((m,i)=>`<button class="mb ${i===mi?'active':''} ${tom[i]>0?'':'dis'}" onclick="setM(${i},this)">${MS[i]}</button>`).join('');
  const tF=fi.map(i=>tom[i]),lF=fi.map(i=>lenka[i]),pF=fi.map(i=>pr[i]||(tom[i]+(lenka[i]||0))),vF=fi.map(i=>vd[i]),vhF=fi.map(i=>vh[i]),iF=fi.map(i=>inv[i]),oF=fi.map(i=>ost[i]),lbs=fi.map(i=>MS[i]);
  const vc=VH<0?'var(--red)':'var(--green)';
  document.getElementById('tp').innerHTML=`
    <div class="mr"><span class="ml">MĚSÍC →</span>${mbs}</div>
    <div class="kg">
      <div class="kpi g"><div class="ki">↑</div><div class="kl">Příjmy rodiny</div><div class="kv">${fk(P)}</div><div class="ks">Tom + Lenka</div></div>
      <div class="kpi r"><div class="ki">↓</div><div class="kl">Výdaje celkem</div><div class="kv">${fk(V)}</div><div class="ks">vč. ostatních</div></div>
      <div class="kpi" style="border-top:2px solid ${vc}"><div class="ki">=</div><div class="kl">VH rodiny</div><div class="kv" style="color:${vc}">${fk(VH)}</div><div class="ks">${VH<0?'záporný':'kladný'} měsíc</div></div>
      <div class="kpi o"><div class="ki">📈</div><div class="kl">Hodnota portfolia</div><div class="kv">${fm(INV)}</div><div class="ks">celkový majetek</div></div>
