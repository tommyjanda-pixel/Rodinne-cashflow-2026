<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodinné Finance · 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0b;--s1:#111113;--s2:#18181b;--b1:#27272a;--b2:#3f3f46;--g2:#22c55e;--gd:rgba(34,197,94,.1);--r:#ef4444;--rd:rgba(239,68,68,.1);--b:#3b82f6;--bd:rgba(59,130,246,.1);--o:#f59e0b;--od:rgba(245,158,11,.1);--t1:#fafafa;--t2:#a1a1aa;--t3:#52525b;--font:'Geist',sans-serif;--mono:'Geist Mono',monospace;--serif:'Instrument Serif',serif}
body{background:var(--bg);color:var(--t1);font-family:var(--font);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--b1);position:sticky;top:0;background:rgba(10,10,11,.95);backdrop-filter:blur(12px);z-index:100}
.nb{display:flex;align-items:center;gap:10px}
.nl{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#22c55e,#0ea5e9);display:grid;place-items:center;font-size:15px}
.nt{font-family:var(--serif);font-size:17px;letter-spacing:-.3px}
.ns{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:1px}
.nr{display:flex;align-items:center;gap:8px}
.st{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t3);font-family:var(--mono)}
.dot{width:5px;height:5px;border-radius:50%;background:var(--g2);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1;box-shadow:0 0 5px var(--g2)}50%{opacity:.2}}
.rbtn{padding:4px 11px;border-radius:6px;border:1px solid var(--b1);background:transparent;color:var(--t2);font-size:10px;font-family:var(--mono);cursor:pointer;transition:.15s}
.rbtn:hover{border-color:var(--b2);color:var(--t1)}
.tabs{display:flex;padding:0 28px;border-bottom:1px solid var(--b1)}
.tab{padding:11px 16px;font-size:12px;font-weight:500;color:var(--t3);cursor:pointer;border:none;background:transparent;font-family:var(--font);border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s}
.tab:hover{color:var(--t2)}
.tab.on{color:var(--t1);border-bottom-color:var(--g2)}
main{padding:22px 28px;max-width:1400px}
.panel{display:none}.panel.on{display:block}
.ld{display:flex;align-items:center;justify-content:center;gap:8px;padding:70px 0;color:var(--t3);font-family:var(--mono);font-size:11px}
.sp{width:15px;height:15px;border:1.5px solid var(--b2);border-top-color:var(--g2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.mr{display:flex;align-items:center;gap:5px;margin-bottom:18px;flex-wrap:wrap}
.ml{font-size:10px;color:var(--t3);font-family:var(--mono);margin-right:2px}
.mp{padding:3px 11px;border-radius:20px;font-size:10px;font-weight:500;cursor:pointer;border:1px solid var(--b1);background:transparent;color:var(--t3);font-family:var(--mono);transition:.15s}
.mp:hover{border-color:var(--b2);color:var(--t2)}
.mp.on{background:var(--g2);color:#000;border-color:var(--g2)}
.mp.dim{opacity:.2;cursor:default;pointer-events:none}
.kg{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:16px}
.kc{background:var(--s1);border:1px solid var(--b1);border-radius:11px;padding:16px 18px;position:relative;overflow:hidden}
.kc::after{content:'';position:absolute;top:0;left:0;right:0;height:1px}
.kc.g::after{background:linear-gradient(90deg,transparent,var(--g2),transparent)}
.kc.r::after{background:linear-gradient(90deg,transparent,var(--r),transparent)}
.kc.b::after{background:linear-gradient(90deg,transparent,var(--b),transparent)}
.kc.o::after{background:linear-gradient(90deg,transparent,var(--o),transparent)}
.kl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.3px;color:var(--t3);font-family:var(--mono);margin-bottom:7px}
.kv{font-size:19px;font-weight:600;letter-spacing:-.5px;margin-bottom:2px}
.kc.g .kv{color:var(--g2)}.kc.r .kv{color:var(--r)}.kc.b .kv{color:var(--b)}.kc.o .kv{color:var(--o)}
.ks{font-size:9px;color:var(--t3);font-family:var(--mono)}
.cr{display:grid;grid-template-columns:2fr 1fr;gap:9px;margin-bottom:9px}
.cr2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.cc{background:var(--s1);border:1px solid var(--b1);border-radius:11px;padding:16px 20px}
.ct{font-size:11px;font-weight:600;margin-bottom:14px;color:var(--t2);letter-spacing:.2px}
svg{overflow:visible;display:block;width:100%}
.dt{width:100%;border-collapse:collapse;font-size:11px}
.dt th{text-align:left;padding:0 0 7px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--t3);font-family:var(--mono);border-bottom:1px solid var(--b1)}
.dt th.r,.dt td.r{text-align:right}
.dt td{padding:8px 0;border-bottom:1px solid var(--b1)}
.dt tfoot td{border-top:1px solid var(--b2);border-bottom:none;padding-top:9px;font-weight:700}
.tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:8px;font-family:var(--mono);margin-left:4px}
.tg{background:var(--gd);color:var(--g2)}.tr{background:var(--rd);color:var(--r)}.tb{background:var(--bd);color:var(--b)}.to{background:var(--od);color:var(--o)}.tp{background:rgba(168,85,247,.1);color:#a855f7}
.vb{border-radius:11px;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;margin-top:9px;border:1px solid;flex-wrap:wrap;gap:10px}
.vb.neg{background:var(--rd);border-color:rgba(239,68,68,.2)}.vb.pos{background:var(--gd);border-color:rgba(34,197,94,.2)}
.vl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);font-family:var(--mono);margin-bottom:4px}
.vv{font-family:var(--serif);font-size:28px;letter-spacing:-.5px}
.vb.neg .vv{color:var(--r)}.vb.pos .vv{color:var(--g2)}
.vn{font-size:10px;color:var(--t3);font-family:var(--mono);max-width:280px;line-height:1.6}
.df{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.dr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1)}
.dn{font-size:11px}.ds{font-size:9px;color:var(--t3);font-family:var(--mono)}
.dv{font-size:10px;font-weight:600;font-family:var(--mono)}
.pl{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.pi{display:flex;align-items:center;gap:7px;font-size:10px}
.pd{width:7px;height:7px;border-radius:2px;flex-shrink:0}.pn{color:var(--t3);flex:1}.pp{font-family:var(--mono);font-weight:600}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.fc{background:var(--s2);border:1px solid var(--b1);border-radius:9px;padding:12px 14px}
.fn{font-size:11px;font-weight:600;margin-bottom:8px}
.fr{display:flex;justify-content:space-between;font-size:10px;margin-bottom:4px;font-family:var(--mono);color:var(--t3)}
.fn2{font-size:9px;color:var(--t3);margin-top:7px;padding:5px 7px;background:var(--s1);border-radius:5px;font-family:var(--mono)}
.tip{margin-top:14px;padding:12px 16px;background:var(--gd);border:1px solid rgba(34,197,94,.15);border-radius:9px}
.tip-t{font-size:10px;font-weight:600;color:var(--g2);margin-bottom:5px}
.tip-b{font-size:9px;color:var(--t3);font-family:var(--mono);line-height:1.7}
@media(max-width:900px){.kg{grid-template-columns:1fr 1fr}.cr,.cr2,.df{grid-template-columns:1fr}}
@media(max-width:580px){nav{padding:12px 14px}.tabs{padding:0 14px}main{padding:14px}.kg{gap:6px}.kc{padding:12px 13px}.kv{font-size:16px}.cc{padding:13px 12px}.tab{padding:9px 10px;font-size:11px}.nr{display:none}.vb{flex-direction:column}.fg{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <div class="nb"><div class="nl">💼</div><div><div class="nt">Rodinné Finance</div><div class="ns">Tom & Lenka · Matyáš · Elinka · 2026</div></div></div>
  <div class="nr"><div class="st"><div class="dot"></div><span id="upd">Načítám...</span></div><button class="rbtn" onclick="load()">↻ Obnovit</button></div>
</nav>
<div class="tabs">
  <button class="tab on" onclick="go('p',this)">📊 Přehled</button>
  <button class="tab" onclick="go('c',this)">💸 Cashflow</button>
  <button class="tab" onclick="go('m',this)">🏛 Majetek</button>
  <button class="tab" onclick="go('pl',this)">📋 Plán</button>
</div>
<main>
  <div class="panel on" id="tp"><div class="ld"><div class="sp"></div>Načítám data...</div></div>
  <div class="panel" id="tc"><div class="ld"><div class="sp"></div></div></div>
  <div class="panel" id="tm"><div class="ld"><div class="sp"></div></div></div>
  <div class="panel" id="tpl"><div class="ld"><div class="sp"></div></div></div>
</main>
<script>
const SID='1Enami9v_fK1i5JgmMqaIv3vqEZ--mIbDhFIj6aCmsCw';
const MN=['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
const MS=['Led','Úno','Bře','Dub','Kvě','Čer','Čvc','Srp','Zář','Říj','Lis','Pro'];
const FB={mes:{'Příjem Tom':[71000,82700,60000,73000,0,0,0,0,0,0,0,0],'Příjem Lenka':[19000,19000,19000,19000,0,0,0,0,0,0,0,0],'Souhrn příjmů':[90000,101700,79000,92000,0,0,0,0,0,0,0,0],'Souhrn výdajů':[154039,184039,163039,124039,0,0,0,0,0,0,0,0],'VH rodiny':[-64039,-82339,-84039,-32039,0,0,0,0,0,0,0,0],'Hodnota investic':[28539219,28664219,28570219,28659219,0,0,0,0,0,0,0,0],'Ostatní výdaje':[75000,105000,84000,45000,0,0,0,0,0,0,0,0]},aktiva:[{n:'RD Řitka',h:24000000,d:4100000,m:2000000},{n:'Antala Staška 35%',h:2520000,d:0,m:0},{n:'Degiro',h:710500,d:0,m:0},{n:'XTB',h:134750,d:0,m:0},{n:'Portu',h:40000,d:0,m:0},{n:'Crypto',h:3969,d:0,m:0},{n:'Auto (Tesla Y)',h:700000,d:600000,m:0},{n:'Tomas Challenge',h:50000,d:0,m:0},{n:'SportWave',h:500000,d:200000,m:0}],plan:{p:[{n:'Ostatní příjmy',t:'pasivum',v:45000},{n:'BF bazar',t:'aktivum',v:7000},{n:'Automaty',t:'pasivum',v:1000}],v:[{n:'Hypotéky 1+2',t:'výdaj',v:23000},{n:'Elektřina záloha',t:'výdaj',v:6000},{n:'ETF Degiro+XTB',t:'spoření',v:5000},{n:'Životko',t:'výdaj',v:820},{n:'Pojištění úvěrů',t:'výdaj',v:776},{n:'Pojištění domu',t:'výdaj',v:583},{n:'Maty spoření',t:'spoření',v:1000},{n:'Ella spoření',t:'spoření',v:1000},{n:'Jablotron',t:'výdaj',v:60}]}};
let S={mi:3,cfi:3,mes:FB.mes,ak:FB.aktiva,pl:FB.plan};
const fk=v=>{if(!v&&v!==0||isNaN(v))return'—';const a=Math.abs(v);return(v<0?'−':'')+new Intl.NumberFormat('cs-CZ',{maximumFractionDigits:0}).format(a)+' Kč'};
const fm=v=>{if(!v&&v!==0)return'—';return Math.abs(v)>=1e6?(v/1e6).toFixed(2)+' M Kč':fk(v)};
const pk=s=>{if(!s)return 0;const c=s.toString().replace(/[^\d.,-]/g,'').replace(/\./g,'').replace(',','.');const n=parseFloat(c);return isNaN(n)?0:n};
const ga=(...ks)=>{for(const k of ks){if(S.mes[k])return S.mes[k]}return Array(12).fill(0)};
function gviz(sheet){return new Promise((res,rej)=>{const cb='_gv'+Date.now();const s=document.createElement('script');const t=setTimeout(()=>{cl();rej()},10000);function cl(){delete window[cb];try{document.head.removeChild(s)}catch(e){}clearTimeout(t)}window[cb]=d=>{cl();try{const cols=d.table.cols.map(c=>c.label||'');const rows=d.table.rows.map(r=>(r.c||[]).map(c=>c&&c.v!=null?String(c.v):''));res([cols,...rows])}catch(e){rej(e)}};s.onerror=()=>{cl();rej()};s.src=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&callback=${cb}&sheet=${encodeURIComponent(sheet)}&t=${Date.now()}`;document.head.appendChild(s)})}
function pAkt(rows){const ak=[],mes={};let hdr=false;for(const r of rows){const n=(r[0]||'').trim();if(!n)continue;if(n==='Název'){hdr=true;continue}if(!hdr||n==='Míra zadlužení'||n.startsWith('1.'))continue;const h=pk(r[1]),d=pk(r[2]||''),m=pk(r[3]||'');if(h>0)ak.push({n,h,d,m});const ml=(r[6]||'').trim();if(ml){mes[ml]=r.slice(7,19).map(v=>pk(v))}}return{ak,mes}}
function pCF(rows){const p=[],v=[];for(const r of rows){const n=(r[0]||'').trim(),t=(r[2]||'').trim(),val=pk(r[4]);if(!n||!val||n.startsWith('Total')||n==='Zůstatek'||n.startsWith('Změna'))continue;if(['výdaj','spoření','investice'].includes(t))v.push({n,t,v:val});else if(val>0)p.push({n,t,v:val})}return{p,v}}
async function load(){document.getElementById('upd').textContent='Načítám...';try{const[ar,cr]=await Promise.all([gviz('Aktiva'),gviz('Cashflow')]);const{ak,mes}=pAkt(ar);const pl=pCF(cr);if(ak.length)S.ak=ak;if(Object.keys(mes).length)S.mes=mes;if(pl.v.length)S.pl=pl;const tom=ga('Příjem Tom',' Příjem Tom');let last=3;tom.forEach((v,i)=>{if(v>0)last=i});S.mi=last;S.cfi=last;const now=new Date();document.getElementById('upd').textContent=`Live · ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`}catch(e){document.getElementById('upd').textContent='Záložní data'}renderAll()}
function go(id,btn){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));document.getElementById('t'+id).classList.add('on');btn.classList.add('on')}
function sM(i,btn){S.mi=i;document.querySelectorAll('#tp .mp').forEach(b=>b.classList.remove('on'));btn.classList.add('on');rP()}
function sCF(i,btn){S.cfi=i;document.querySelectorAll('#tc .mp').forEach(b=>b.classList.remove('on'));btn.classList.add('on');rC()}
function renderAll(){rP();rC();rM();rPl()}
function sBar(ser,lbs,cols,W=500,H=170){const pl=44,pr=8,pt=6,pb=22,cW=W-pl-pr,cH=H-pt-pb;const all=ser.flatMap(s=>s).filter(v=>v>0);const mx=Math.max(...all,1)*1.08;const gW=cW/lbs.length,bw=gW*.26;let b='',y='',x='';for(let i=0;i<=4;i++){const v=(mx/4)*i,yy=cH-(v/mx*cH);y+=`<line x1="0" y1="${yy}" x2="${cW}" y2="${yy}" stroke="#27272a"/>`;y+=`<text x="-4" y="${yy+4}" text-anchor="end" fill="#52525b" font-size="9" font-family="Geist Mono">${v>=1e6?(v/1e6).toFixed(1)+'M':(v/1000).toFixed(0)+'k'}</text>`}lbs.forEach((l,i)=>{const cx=i*gW+gW/2,st=cx-(ser.length*(bw+2))/2;ser.forEach((s,si)=>{const v=s[i]||0;if(!v)return;const h=(v/mx)*cH;b+=`<rect x="${st+si*(bw+2)}" y="${cH-h}" width="${bw}" height="${h}" fill="${cols[si]}" rx="2" opacity=".9"/>`});x+=`<text x="${cx}" y="${cH+16}" text-anchor="middle" fill="#52525b" font-size="9" font-family="Geist Mono">${l}</text>`});return`<svg viewBox="0 0 ${W} ${H}"><g transform="translate(${pl},${pt})">${y}${b}${x}<line x1="0" y1="${cH}" x2="${cW}" y2="${cH}" stroke="#27272a"/></g></svg>`}
function sLine(vals,col,W=270,H=130,fmt){const pl=42,pr=8,pt=6,pb=22,cW=W-pl-pr,cH=H-pt-pb;const vf=vals.filter(v=>v!==0&&!isNaN(v));if(!vf.length)return'<svg></svg>';const mn=Math.min(...vf),mx=Math.max(...vf),rng=mx-mn||1;const pts=vals.map((v,i)=>[(i/(vals.length-1))*cW,cH-((v-mn)/rng*cH)]);const pth='M'+pts.map(p=>p.join(',')).join('L');const area=`M${pts[0][0]},${cH}L${pts.map(p=>p.join(',')).join('L')}L${pts[pts.length-1][0]},${cH}Z`;const f=fmt||(v=>Math.abs(v)>=1e6?(v/1e6).toFixed(1)+'M':(v/1000).toFixed(0)+'k');let y='',d='',x='';for(let i=0;i<=3;i++){const v=mn+(rng/3)*i,yy=cH-((v-mn)/rng*cH);y+=`<line x1="0" y1="${yy}" x2="${cW}" y2="${yy}" stroke="#27272a"/>`;y+=`<text x="-4" y="${yy+4}" text-anchor="end" fill="#52525b" font-size="9" font-family="Geist Mono">${f(v)}</text>`}pts.forEach((p,i)=>{d+=`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${col}" stroke="#0a0a0b" stroke-width="1.5"/>`;x+=`<text x="${p[0]}" y="${cH+16}" text-anchor="middle" fill="#52525b" font-size="9" font-family="Geist Mono">${MS[i]}</text>`});return`<svg viewBox="0 0 ${W} ${H}"><g transform="translate(${pl},${pt})">${y}<path d="${area}" fill="${col}" opacity=".06"/><path d="${pth}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/>${d}${x}<line x1="0" y1="${cH}" x2="${cW}" y2="${cH}" stroke="#27272a"/></g></svg>`}
function sPie(segs){const cx=80,cy=68,r=56,ir=30,W=160,H=136;const tot=segs.reduce((s,sg)=>s+sg.v,0);let a=-Math.PI/2,p='';segs.forEach(sg=>{const sl=(sg.v/tot)*2*Math.PI;const x1=cx+r*Math.cos(a),y1=cy+r*Math.sin(a),x2=cx+r*Math.cos(a+sl),y2=cy+r*Math.sin(a+sl);const ix1=cx+ir*Math.cos(a),iy1=cy+ir*Math.sin(a),ix2=cx+ir*Math.cos(a+sl),iy2=cy+ir*Math.sin(a+sl);p+=`<path d="M${ix1},${iy1}L${x1},${y1}A${r},${r} 0 ${sl>Math.PI?1:0},1 ${x2},${y2}L${ix2},${iy2}A${ir},${ir} 0 ${sl>Math.PI?1:0},0 ${ix1},${iy1}Z" fill="${sg.c}" opacity=".88" stroke="#0a0a0b" stroke-width="2"/>`;a+=sl});const tl=tot>=1e6?(tot/1e6).toFixed(1)+'M':fk(tot);return`<svg viewBox="0 0 ${W} ${H}">${p}<text x="${cx}" y="${cy-1}" text-anchor="middle" fill="#fafafa" font-size="10" font-family="Geist Mono">${tl}</text><text x="${cx}" y="${cy+13}" text-anchor="middle" fill="#52525b" font-size="8" font-family="Geist Mono">celkem</text></svg>`}
function lg2(it){return it.map(i=>`<div style="display:flex;align-items:center;gap:5px;font-size:9px;font-family:'Geist Mono',monospace"><div style="width:7px;height:7px;background:${i.c};border-radius:2px"></div><span style="color:#52525b">${i.n}</span></div>`).join('')}
function lgd(it){return it.map(i=>`<div class="pi"><div class="pd" style="background:${i.c}"></div><div class="pn">${i.n}</div><div class="pp" style="color:${i.c}">${i.p}</div></div>`).join('')}
