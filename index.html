#hd-time{font-size:11px;color:var(--t3)}

.ti{font-size:22px;line-height:1;transition:transform .15s}

.tl{font-size:10px;font-weight:500}
.panel{display:none;animation:fup .28s ease}.panel.on{display:block}

.hval{font-size:40px;font-weight:700;letter-spacing:-1.5px;line-height:1.1}

.micon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;margin-right:11px;background:var(--bg)}

.mname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.drows{flex:1}

.prow{display:flex;align-items:center;padding:11px 16px;border-bottom:1px solid var(--border);gap:8px}

.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.psub{font-size:10px;color:var(--t3);margin-top:1px}

.upd{text-align:center;font-size:11px;color:var(--t3);padding:14px 0 6px}
.upd b{color:var(--t2)}
@media(min-width:600px){#content,#hd,#tb{max-width:480px;margin:0 auto;left:50%;transform:translateX(-50%)}}
</style>
</head>

let S={mi:4,data:FB,source:'embedded',updated:'2026-05-10'};
const fk=v=>{if(v===null||v===undefined||isNaN(v))return'—';if(v===0)return'0 Kč';const a=Math.abs(Math.round(v));return(v<0?'−':'')+a.toLocaleString('cs-CZ')+' Kč'};
const fs=v=>{if(!v&&v!==0)return'—';const a=Math.abs(v);if(a>=1e6)return(v<0?'−':'')+(a/1e6).toFixed(2).replace(/\.?0+$/,'')+'M';if(a>=1000)return(v<0?'−':'')+Math.round(a/1000)+'k';return fk(v)};
const pk=s=>{if(!s)return 0;const c=String(s).replace(/[^\d,.-]/g,'').replace(/\./g,'').replace(',','.');const n=parseFloat(c);return isNaN(n)?0:n};
function gviz(sheet){return new Promise((res,rej)=>{const cb='_gv'+Date.now();const sc=document.createElement('script');const t=setTimeout(()=>{cl();rej(new Error('timeout'))},8000);function cl(){delete window[cb];try{document.head.removeChild(sc)}catch(e){}clearTimeout(t)}window[cb]=d=>{cl();try{const cols=d.table.cols.map(c=>c.label||'');const rows=d.table.rows.map(r=>(r.c||[]).map(c=>c&&c.v!=null?String(c.v):''));res([cols,...rows])}catch(e){rej(e)}};sc.onerror=()=>{cl();rej(new Error('load'))};sc.src=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&callback=${cb}&sheet=${encodeURIComponent(sheet)}&t=${Date.now()}`;document.head.appendChild(sc)})}
function parseAktiva(rows){const assets=[],monthly={};let inAssets=false;for(const r of rows){const n=(r[0]||'').trim();if(!n)continue;if(n==='Název'){inAssets=true;continue}if(!inAssets)continue;if(n==='Míra zadlužení'||n.startsWith('1.'))continue;const mLabel=(r[4]||r[5]||'').trim();if(mLabel){monthly[mLabel]=r.slice(5,17).map(v=>pk(v))}const h=pk(r[1]);if(h>0){const icons={'Řitka':'🏡','Staška':'🏢','Degiro':'📈','XTB':'📊','Portu':'💼','Zlato':'🪙','Crypto':'₿','Auto':'🚗','Challenge':'🏋️','Wave':'🌊'};const icon=Object.entries(icons).find(([k])=>n.includes(k));assets.push({n,h,d:pk(r[2]),m:pk(r[3]),i:icon?icon[1]:'💰'})}}return{assets,monthly}}
function parseCF(rows){const income=[],expenses=[];let ti=0,te=0;const tm={'pasivum':'pasivum','aktivum':'aktivum','spoření':'spoření','investice':'spoření','výdaj':'výdaj'};for(const r of rows){const n=(r[0]||'').trim(),t=(r[2]||'').trim();if(!n)continue;if(n==='Total příjmy'){ti=pk(r[3]);continue}if(n==='Total výdaje'){te=pk(r[3]);continue}if(n.startsWith('Total')||n==='Zůstatek'||n.startsWith('Změna')||n==='DRUH'||!t)continue;const item={n,o:(r[1]||'').trim(),t:tm[t]||t,mon:pk(r[4]),yr:pk(r[5])};if(['pasivum','aktivum'].includes(item.t))income.push(item);else if(['výdaj','spoření'].includes(item.t))expenses.push(item)}return{income,expenses,totalIncome:ti,totalExpenses:te}}

  const vhRows=MNS.map((mn,i)=>{const v=m.vh[i]||0;if(v===0&&i>mi)return'';const pct=Math.round(Math.abs(v)/maxA*100);const cls=v>=0?'p':'n';return`<div class="vhrow"><div class="vhmn">${mn}</div><div class="vhbar-w"><div class="vhbar ${cls}" style="width:${pct}%"></div></div><div class="vhval ${cls}">${v===0?'—':fk(v)}</div></div>`}).join('');
  const n=Math.min(6,MNS.length);const incV=m.totInc.slice(0,n),expV=m.totExp.slice(0,n);const maxV=Math.max(...incV,...expV,1);
  let bc='';for(let i=0;i<n;i++){const x=i*(340/n),cw=340/n,bw=cw*.3,iH=(incV[i]/maxV)*100,eH=(expV[i]/maxV)*100,op=i>mi?.3:1,cur=i===mi;if(cur)bc+=`<rect x="${x+1}" y="8" width="${cw-2}" height="100" rx="5" fill="rgba(0,122,255,.05)"/>`;if(iH>0)bc+=`<rect x="${x+cw/2-bw-1}" y="${108-iH}" width="${bw}" height="${iH}" rx="3" fill="#34c759" opacity="${op}"/>`;if(eH>0)bc+=`<rect x="${x+cw/2+1}" y="${108-eH}" width="${bw}" height="${eH}" rx="3" fill="#ff3b30" opacity="${op}"/>`;bc+=`<text x="${x+cw/2}" y="126" text-anchor="middle" font-size="9" fill="${cur?'#007aff':'#8e8e93'}" font-family="-apple-system,sans-serif" font-weight="${cur?700:400}">${MNS[i]}</text>`}
  document.getElementById('tp').innerHTML=`
    <div class="mpills">${pills}</div>
    <div class="hero"><div class="hlbl">${MNF[mi]} 2026 · Výsledek</div><div class="hval ${vh<0?'neg':'pos'}">${fk(vh)}</div><div class="hgrid"><div class="hcell"><div class="hcl">Příjmy</div><div class="hcv inc">${fk(totIn)}</div></div><div class="hcell"><div class="hcl">Výdaje</div><div class="hcv exp">${fk(totEx)}</div></div></div></div>
    <div class="sec"><div class="sec-title">Rok 2026 – dosud</div><div class="card"><div class="kgrid"><div class="kcell"><div class="kl">Příjmy celkem</div><div class="kv g">${fs(ytdIn)}</div></div><div class="kcell"><div class="kl">Výdaje celkem</div><div class="kv r">${fs(ytdEx)}</div></div><div class="kcell"><div class="kl">VH hospodaření</div><div class="kv ${ytdVH>=0?'g':'r'}">${fs(ytdVH)}</div></div><div class="kcell"><div class="kl">Hodnota investic</div><div class="kv b">${fs(ytdInv)}</div></div></div></div></div>
    <div class="sec"><div class="sec-title">Příjmy vs. výdaje</div><div class="card"><div style="padding:14px"><div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);margin-bottom:10px">Prvních 6 měsíců 2026</div><svg viewBox="0 0 340 130" style="width:100%;display:block">${bc}</svg></div></div></div>
    <div class="sec"><div class="sec-title">VH po měsících</div><div class="card">${vhRows}</div></div>
    <div class="upd">Zdroj: <b>${S.source==='live'?'živá data ze Sheets':'záložní data'}</b> · ${S.updated}</div>
    <div style="height:8px"></div>`}
function renderCashflow(){
  const d=S.data,mi=S.mi,m=d.monthly;
  const totIn=m.totInc[mi]||0,totEx=m.totExp[mi]||0,vh=m.vh[mi]||0;
  const icons={'příjmy':'💼','Kelta':'📣','Sazka':'🎯','Automaty':'🎰','dičovsk':'👶','bazar':'♻️','ETF':'📈','Degiro':'📈','Maty sp':'🐣','Ella sp':'🌸','yp':'🏠','kolka':'🏫','tko':'💊','lektr':'⚡','Netflix':'🎬','Wifi':'📶','ablotr':'🔔','úvěr':'🛡','domu':'🏡','Tesla':'🚗','Jídlo':'🛒','olen':'✈️','ostatní':'📦'};
  const gi=n=>{for(const[k,v] of Object.entries(icons))if(n.toLowerCase().includes(k.toLowerCase()))return v;return'·'};
  const tc=t=>({'pasivum':'var(--green)','aktivum':'var(--purple)','spoření':'var(--blue)','výdaj':'var(--red)'}[t]||'var(--t3)');
  const bc=t=>({'pasivum':'pb-pas','aktivum':'pb-akt','spoření':'pb-spo','výdaj':'pb-vyd'}[t]||'pb-vyd');
  const row=(item,isInc)=>{const val=item.mon||item.yr||0;const cls=isInc?'g':(item.t==='spoření'?'b':'r');const sign=isInc?'+':'−';return`<div class="mrow"><div class="micon">${gi(item.n)}</div><div class="minfo"><div class="mname">${item.n}</div><div class="mdet">${item.o} · ${item.t}</div></div><div class="mval ${val===0?'m':cls}">${val===0?'0 Kč':sign+fk(val)}</div></div>`};
  document.getElementById('tc').innerHTML=`
    <div class="sec" style="padding-top:14px"><div class="sec-title">${MNF[mi]} 2026</div><div class="card"><div class="mrow"><div class="micon">💰</div><div class="minfo"><div class="mname">Celkové příjmy</div><div class="mdet">Tom + Lenka + Firmy</div></div><div class="mval g">${fk(totIn)}</div></div><div class="mrow"><div class="micon">💸</div><div class="minfo"><div class="mname">Celkové výdaje</div><div class="mdet">Vše dohromady</div></div><div class="mval r">${fk(totEx)}</div></div><div class="mrow"><div class="micon">${vh>=0?'✅':'⚠️'}</div><div class="minfo"><div class="mname">Výsledek hospodaření</div><div class="mdet">Příjmy − Výdaje</div></div><div class="mval ${vh>=0?'g':'r'}">${fk(vh)}</div></div></div></div>
    <div class="sec"><div class="sec-title">Příjmy</div><div class="card">${d.income.map(i=>row(i,true)).join('')}</div></div>
    <div class="sec"><div class="sec-title">Výdaje</div><div class="card">${d.expenses.filter(e=>e.t==='výdaj').map(i=>row(i,false)).join('')}</div></div>
    <div class="sec"><div class="sec-title">Spoření & Investice</div><div class="card">${d.expenses.filter(e=>e.t==='spoření').map(i=>row(i,false)).join('')}</div></div>
    <div style="height:8px"></div>`}
function renderAssets(){
  const assets=S.data.assets.filter(a=>a.h>0||a.n);
  const tA=assets.reduce((s,a)=>s+a.h,0),tD=assets.reduce((s,a)=>s+a.d,0),tM=assets.reduce((s,a)=>s+a.m,0);
  const net=tA-tD-tM,dr=tA>0?Math.round(tD/tA*100):0;
  const circ=2*Math.PI*28,offset=circ*(1-dr/100);
  document.getElementById('tm').innerHTML=`
    <div class="ahero"><div class="ahlbl">Celková hodnota aktiv</div><div class="ahval">${fk(tA)}</div><div class="ahbadges"><div class="ahbadge"><span>Dluh </span>${fk(tD)}</div><div class="ahbadge"><span>Mirek </span>${fk(tM)}</div></div></div>
    <div class="sec"><div class="sec-title">Čistý majetek</div><div class="card"><div class="kgrid"><div class="kcell"><div class="kl">Čistá aktiva</div><div class="kv b">${fs(tA-tD)}</div></div><div class="kcell"><div class="kl">Vlastní (bez Mirka)</div><div class="kv p">${fs(net)}</div></div><div class="kcell"><div class="kl">Celkový dluh</div><div class="kv r">${fs(tD)}</div></div><div class="kcell"><div class="kl">Míra zadlužení</div><div class="kv ${dr<30?'g':'r'}">${dr} %</div></div></div></div></div>
    <div class="sec"><div class="sec-title">Zadluženost</div><div class="card"><div class="dw"><div class="rbox"><svg width="66" height="66" viewBox="0 0 66 66"><circle cx="33" cy="33" r="28" fill="none" stroke="var(--bg)" stroke-width="7"/><circle cx="33" cy="33" r="28" fill="none" stroke="${dr<30?'var(--green)':'var(--red)'}" stroke-width="7" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg><div class="rtxt">${dr}%</div></div><div class="drows"><div class="drow"><span class="drl">Celková hodnota</span><span class="drv">${fk(tA)}</span></div><div class="drow"><span class="drl">Celkový dluh</span><span class="drv" style="color:var(--red)">${fk(tD)}</span></div><div class="drow"><span class="drl">Dluh Mirek</span><span class="drv" style="color:var(--orange)">${fk(tM)}</span></div></div></div></div></div>
    <div class="sec"><div class="sec-title">Jednotlivá aktiva</div><div class="card">${assets.map(a=>`<div class="mrow"><div class="micon">${a.i||'💰'}</div><div class="minfo"><div class="mname">${a.n}</div><div class="mdet">${a.d>0?'Dluh: '+fk(a.d):a.m>0?'Mirek: '+fk(a.m):'Bez dluhu'}</div></div><div class="mval ${a.h>0?'b':'m'}">${a.h>0?fk(a.h):'—'}</div></div>`).join('')}</div></div>
    <div style="height:8px"></div>`}
function renderPlan(){
  const d=S.data,mi=S.mi,m=d.monthly;
  const yp=Math.round((mi+1)/12*100);
  const sm=arr=>arr.slice(0,mi+1).reduce((a,b)=>a+(b||0),0);
  const ytdIn=sm(m.totInc),ytdEx=sm(m.totExp);
  const annIn=d.totalIncome*12,annEx=d.totalExpenses*12;
  const inP=Math.min(Math.round(ytdIn/(annIn||1)*100),100),exP=Math.min(Math.round(ytdEx/(annEx||1)*100),100);
  const tc=t=>({'pasivum':'var(--green)','aktivum':'var(--purple)','spoření':'var(--blue)','výdaj':'var(--red)'}[t]||'var(--t3)');
  const bc=t=>({'pasivum':'pb-pas','aktivum':'pb-akt','spoření':'pb-spo','výdaj':'pb-vyd'}[t]||'pb-vyd');
  const prow=item=>{const mon=item.mon||0,yr=item.yr||(mon*12);return`<div class="prow"><div class="pdot" style="background:${tc(item.t)}"></div><div class="pinfo"><div class="pname">${item.n}</div><div class="psub">${item.o}</div></div><div class="pbadge ${bc(item.t)}">${item.t}</div><div class="pvals"><div class="pmon">${mon>0?fk(mon):'—'}</div><div class="pyear">${yr>0?fk(yr)+'/r':''}</div></div></div>`};
  const pg=(title,pct,color)=>`<div class="prg"><div class="prgh"><span class="prgt">${title}</span><span class="prgp">${pct} %</span></div><div class="prgb"><div class="prgf" style="width:${pct}%;background:${color}"></div></div></div>`;
  document.getElementById('tpl').innerHTML=`
    <div class="sec" style="padding-top:14px"><div class="sec-title">Plnění plánu 2026</div><div class="card"><div style="height:14px"></div>${pg(`Rok 2026 · ${mi+1}/12 měs.`,yp,'var(--blue)')}${pg('Plán příjmů YTD',inP,'var(--green)')}${pg('Plán výdajů YTD',exP,'var(--red)')}</div></div>
    <div class="sec"><div class="sec-title">Roční přehled</div><div class="card"><div class="kgrid"><div class="kcell"><div class="kl">Plán příjmy/rok</div><div class="kv g">${fs(annIn)}</div></div><div class="kcell"><div class="kl">Plán výdaje/rok</div><div class="kv r">${fs(annEx)}</div></div><div class="kcell"><div class="kl">YTD příjmy</div><div class="kv b">${fs(ytdIn)}</div></div><div class="kcell"><div class="kl">YTD výdaje</div><div class="kv r">${fs(ytdEx)}</div></div></div></div></div>
    <div class="sec"><div class="sec-title">Plán příjmů</div><div class="card">${d.income.map(prow).join('')}</div></div>
    <div class="sec"><div class="sec-title">Plán výdajů</div><div class="card">${d.expenses.map(prow).join('')}</div></div>
    <div class="upd">Zdroj: <b>${S.source==='live'?'živá data ze Sheets':'záložní data'}</b> · ${S.updated}</div>
    <div style="height:8px"></div>`}
async function boot(){renderAll();document.getElementById('loading').style.display='none';document.getElementById('app').style.display='block';updTime();await loadLive();renderAll();updTime()}
boot();setInterval(()=>{loadLive().then(()=>{renderAll();updTime()})},5*60*1000);
</script>
